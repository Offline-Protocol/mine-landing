<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mine by Offline Protocol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container { max-width: 480px; padding: 40px 20px; }
    h1 { font-size: 48px; font-weight: 700; margin-bottom: 16px; }
    p { font-size: 18px; color: #888; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #6C5CE7;
      color: #fff;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mine</h1>
    <p>The mesh network that rewards you for connecting. Built by Offline Protocol.</p>
    <a href="/download" class="btn">Download Mine</a>
  </div>
</body>
</html>
